# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - ReflectlyBE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_32988B2886BF422786EE96040795E207 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A7ADFBDF73F749B8A13BEB83DE55DB8C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_81FCFEE9783C45498202849A2773ED5E }}

      - name: Configure App Settings for DB
        uses: azure/appservice-settings@v1
        with:
          app-name: 'ReflectlyBE'
          slot-name: 'Production'
          app-settings-json: |
            [
              { "name": "DB_URL", "value": "${{ secrets.DB_URL }}", "slotSetting": false },
              { "name": "DB_USERNAME", "value": "${{ secrets.DB_USERNAME }}", "slotSetting": false },
              { "name": "DB_PASSWORD", "value": "${{ secrets.DB_PASSWORD }}", "slotSetting": false },
              { "name": "JWT_SECRET", "value": "${{ secrets.JWT_SECRET }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_ID", "value": "${{ secrets.GOOGLE_CLIENT_ID }}", "slotSetting": false },
              { "name": "GOOGLE_CLIENT_SECRET", "value": "${{ secrets.GOOGLE_CLIENT_SECRET }}", "slotSetting": false },
              { "name": "SPRING_PROFILES_ACTIVE", "value": "prod", "slotSetting": false },
              { "name": "APP_CORS_ALLOWED_ORIGINS", "value": "${{ secrets.APP_CORS_ALLOWED_ORIGINS }}", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ReflectlyBE'
          slot-name: 'Production'
          package: '*.jar'

      - name: Health check
        continue-on-error: true
        env:
          HEALTH_URL: ${{ secrets.BE_HEALTH_URL }}
        run: |
          URL="${HEALTH_URL:-https://reflectlybe-dgcnc3fxdkb0eccc.eastasia-01.azurewebsites.net}"
          for i in {1..12}; do
            if curl -sf "$URL/actuator/health"; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Waiting for backend to become healthy... ($i/12)"
            sleep 10
          done
          echo "::warning::Backend health check failed. Verify GitHub secrets: JWT_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, DB_*"
          exit 1
